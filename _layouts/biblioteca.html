<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: "ro" }}">

  {%- include head.html -%}

  <body class="page-body page-layout-biblioteca">
    <a class="skip-link" href="#main-content">Sari la conținut</a>

    {%- include header.html -%}

    <main class="site-main" id="main-content">
      <section class="section">
        <div class="site-shell">
          <header class="page-header reading-shell" id="page-top">
            <h1>{{ page.title }}</h1>
            {% if page.permalink == "/glosar" %}
              <p class="page-header__meta">{{ site.data.subjects_glossary.total_entries }} de termeni</p>
            {% endif %}
          </header>
          <div class="editorial-surface">
            {{ content }}
          </div>
        </div>
      </section>
    </main>

    {%- include footer.html -%}
    {%- include site-scripts.html -%}
  </body>

</html>
