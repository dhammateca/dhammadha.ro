<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: "ro" }}">

  {%- include head.html -%}

  <body class="page-body page-layout-nikaya">
    <a class="skip-link" href="#main-content">Sari la conținut</a>

    {%- include header.html -%}

    <main class="site-main" id="main-content">
      <section class="section">
        <div class="site-shell">
          <header class="page-header reading-shell">
            {%- if page.parent_title -%}
              <p class="section-kicker">{{ page.parent_title }}</p>
            {%- else -%}
              <p class="section-kicker">Tipiṭaka</p>
            {%- endif -%}
            <h1>{{ page.title }}</h1>
          </header>
          <div class="editorial-surface">
            <div class="text-card-grid">
              {{ content }}
            </div>
          </div>
        </div>
      </section>
    </main>

    {%- include footer.html -%}
    {%- include site-scripts.html -%}
  </body>

</html>
