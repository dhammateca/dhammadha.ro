<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: "ro" }}">

  {%- include head.html -%}

  <body class="page-body{% if page.url == '/' %} page-home{% endif %} page-layout-{{ page.layout | default: 'default' | slugify }}">
    <a class="skip-link" href="#main-content">Sari la conținut</a>

    {%- include header.html -%}

    <main class="site-main" id="main-content">
      {{ content }}
    </main>

    {%- include footer.html -%}
    {%- include site-scripts.html -%}

  </body>

</html>
