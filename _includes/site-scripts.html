<script>
  (function () {
    var navToggle = document.querySelector('[data-nav-toggle]');
    var nav = document.querySelector('[data-nav]');
    var mobileMedia = window.matchMedia('(max-width: 1080px)');
    var brandText = document.querySelector('.site-brand__text');
    var headerInner = document.querySelector('.site-header__inner');

    var fitBrandText = function () {
      if (!brandText) return;

      brandText.style.fontSize = '';
      var availableWidth = brandText.clientWidth;
      var requiredWidth = brandText.scrollWidth;

      if (!availableWidth || requiredWidth <= availableWidth) return;

      var fontSize = parseFloat(window.getComputedStyle(brandText).fontSize);
      brandText.style.fontSize = (fontSize * (availableWidth * 0.9 / requiredWidth)).toFixed(2) + 'px';
    };

    fitBrandText();
    window.addEventListener('resize', fitBrandText);

    if (window.ResizeObserver && headerInner) {
      new ResizeObserver(fitBrandText).observe(headerInner);
    }

    if (document.fonts && document.fonts.ready) {
      document.fonts.ready.then(fitBrandText);
    }

    if (navToggle && nav) {
      var syncNavState = function () {
        var isMobile = mobileMedia.matches;
        if (isMobile) {
          var expanded = navToggle.getAttribute('aria-expanded') === 'true';
          nav.hidden = !expanded;
        } else {
          nav.hidden = false;
          navToggle.setAttribute('aria-expanded', 'false');
        }

        fitBrandText();
      };

      navToggle.addEventListener('click', function () {
        var expanded = navToggle.getAttribute('aria-expanded') === 'true';
        navToggle.setAttribute('aria-expanded', String(!expanded));
        nav.hidden = expanded;
      });

      if (mobileMedia.addEventListener) {
        mobileMedia.addEventListener('change', syncNavState);
      } else {
        mobileMedia.addListener(syncNavState);
      }

      syncNavState();
    }

    var searchToggle = document.querySelector('[data-search-toggle]');
    var searchPanel = document.querySelector('[data-search-panel]');
    var searchInput = document.querySelector('[data-search-input]');
    var searchClose = document.querySelector('[data-search-close]');
    var searchResults = document.querySelector('[data-search-results]');
    var searchFilters = document.querySelectorAll('[data-search-filter]');
    var searchSummary = document.querySelector('[data-search-summary]');
    var searchResultList = document.querySelector('[data-search-result-list]');
    var searchDocuments = [];
    var activeSearchFilter = 'all';

    var normalizeSearchText = function (value) {
      return value.toLocaleLowerCase('ro').normalize('NFD').replace(/[\u0300-\u036f]/g, '');
    };

    var escapeSearchHtml = function (value) {
      return value.replace(/[&<>"']/g, function (character) {
        return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' }[character];
      });
    };

    var searchScore = function (document, terms) {
      return terms.reduce(function (score, term) {
        var exactWord = new RegExp('(^|[^a-z0-9])' + term.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + '([^a-z0-9]|$)', 'g');
        var title = normalizeSearchText(document.title);
        var content = normalizeSearchText(document.content);
        return score + (title.indexOf(term) !== -1 ? 100 : 0) + ((content.match(exactWord) || []).length * 10);
      }, 0);
    };

    var searchExcerpt = function (document, query) {
      var text = document.content.replace(/\\+/g, ' ').replace(/\s+/g, ' ').trim();
      var matchAt = normalizeSearchText(text).indexOf(normalizeSearchText(query));
      var start = Math.max(0, matchAt - 90);
      var end = Math.min(text.length, matchAt + query.length + 150);
      return (start ? '…' : '') + text.slice(start, end) + (end < text.length ? '…' : '');
    };

    var renderSearch = function () {
      if (!searchInput || !searchResults || !searchSummary || !searchResultList) return;
      var query = searchInput.value.trim();
      searchResults.hidden = !query;
      if (!query) return;

      var normalizedQuery = normalizeSearchText(query);
      var queryTerms = normalizedQuery.split(/\s+/).filter(Boolean);
      var matches = searchDocuments.filter(function (document) {
        var searchable = document.searchText;
        return (activeSearchFilter === 'all' || document.filter === activeSearchFilter) && queryTerms.every(function (term) {
          return searchable.indexOf(term) !== -1;
        });
      }).map(function (document) {
        document.score = searchScore(document, queryTerms);
        return document;
      }).sort(function (first, second) {
        return second.score - first.score;
      }).slice(0, 20);

      searchSummary.textContent = matches.length ? matches.length + ' rezultate pentru „' + query + '”' : 'Niciun rezultat pentru „' + query + '”';
      var groupedMatches = {};
      matches.forEach(function (document) {
        (groupedMatches[document.section] = groupedMatches[document.section] || []).push(document);
      });
      searchResultList.innerHTML = Object.keys(groupedMatches).map(function (section) {
        return '<section class="site-search__group"><h2>' + escapeSearchHtml(section) + '</h2>' + groupedMatches[section].map(function (document) {
          return '<a href="' + escapeSearchHtml(document.url) + '"><strong>' + escapeSearchHtml(document.title) + '</strong><span>' + escapeSearchHtml(searchExcerpt(document, query)) + '</span></a>';
        }).join('') + '</section>';
      }).join('');
    };

    var closeSearch = function () {
      if (!searchToggle || !searchPanel) return;
      searchToggle.setAttribute('aria-expanded', 'false');
      searchPanel.hidden = true;
    };

    if (searchToggle && searchPanel) {
      searchToggle.addEventListener('click', function () {
        var isOpen = searchToggle.getAttribute('aria-expanded') === 'true';
        searchToggle.setAttribute('aria-expanded', String(!isOpen));
        searchPanel.hidden = isOpen;
        if (!isOpen && searchInput) searchInput.focus();
      });

      if (searchClose) searchClose.addEventListener('click', closeSearch);
      document.addEventListener('keydown', function (event) {
        if (event.key === 'Escape') closeSearch();
      });
      if (searchInput && searchResults) {
        searchInput.addEventListener('input', renderSearch);
      }

      fetch('{{ "/cauta.json" | relative_url }}').then(function (response) {
        return response.json();
      }).then(function (documents) {
        searchDocuments = documents.map(function (document) {
          document.searchText = normalizeSearchText(document.title + ' ' + document.content);
          return document;
        });
        renderSearch();
      });

      searchFilters.forEach(function (filter) {
        filter.addEventListener('click', function () {
          var selectedFilter = filter.getAttribute('data-search-filter');
          searchFilters.forEach(function (otherFilter) {
            var isSelected = otherFilter === filter;
            otherFilter.classList.toggle('is-active', isSelected);
            otherFilter.setAttribute('aria-pressed', String(isSelected));
          });
          activeSearchFilter = selectedFilter;
          renderSearch();
        });
      });
    }

    var submenuToggles = document.querySelectorAll('[data-submenu-toggle]');

    if (submenuToggles.length) {
      var closeSubmenu = function (toggle) {
        var submenuId = toggle.getAttribute('aria-controls');
        var controlledSubmenu = submenuId ? document.getElementById(submenuId) : null;
        toggle.setAttribute('aria-expanded', 'false');
        if (controlledSubmenu) {
          controlledSubmenu.hidden = true;
        }
      };

      submenuToggles.forEach(function (submenuToggle) {
        var submenuId = submenuToggle.getAttribute('aria-controls');
        var submenu = submenuId ? document.getElementById(submenuId) : null;

        if (!submenu) {
          return;
        }

        submenu.hidden = true;
        submenuToggle.addEventListener('click', function () {
          var expanded = submenuToggle.getAttribute('aria-expanded') === 'true';

          submenuToggles.forEach(function (otherToggle) {
            if (otherToggle !== submenuToggle) {
              closeSubmenu(otherToggle);
            }
          });

          submenuToggle.setAttribute('aria-expanded', String(!expanded));
          submenu.hidden = expanded;
        });
      });

      document.addEventListener('click', function (event) {
        submenuToggles.forEach(function (submenuToggle) {
          var submenuId = submenuToggle.getAttribute('aria-controls');
          var submenu = submenuId ? document.getElementById(submenuId) : null;

          if (!submenu) {
            return;
          }

          if (!submenu.contains(event.target) && !submenuToggle.contains(event.target)) {
            closeSubmenu(submenuToggle);
          }
        });
      });
    }

    var accordionItems = document.querySelectorAll('[data-accordion-item]');
    accordionItems.forEach(function (item) {
      var control = item.querySelector('[data-accordion-control]');
      var panel = item.querySelector('[data-accordion-panel]');
      if (!control || !panel) {
        return;
      }

      var toggleAccordion = function () {
        var expanded = control.getAttribute('aria-expanded') === 'true';
        control.setAttribute('aria-expanded', String(!expanded));
        panel.hidden = expanded;
        item.classList.toggle('is-open', !expanded);
      };

      panel.hidden = true;
      control.addEventListener('click', toggleAccordion);
    });
  }());
</script>
